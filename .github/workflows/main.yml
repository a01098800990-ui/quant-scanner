name: Quant Scanner
on:
  schedule:
    # 1. Run at 23:30 from Monday to Friday
    - cron: "30 23 * * 1-5"
    # 2. Run hourly from 00:30 to 06:30, Monday to Friday
    - cron: "30 0-6 * * 1-5"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Scanner
        run: python scanner.py
        env:
          GSPREAD_KEY: ${{ secrets.GSPREAD_KEY }}
