name: Quant Scanner
on:
  schedule:
    # 1. 월~금 밤 23시 30분 실행
    - cron: "30 23 * * 1-5"
    # 2. 월~금 새벽 0시 30분 ~ 6시 30분까지 매 시간 실행
    - cron: "30 0-6 * * 1-5"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Scanner
        run: python scanner.py
        env:
          GSPREAD_KEY: ${{ secrets.GSPREAD_KEY }}
